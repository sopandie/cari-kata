<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Word Search Ceria</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>🔎 Word Search Ceria</h1>

      <div class="level-box">
        <label>Pilih Tema:</label>
        <select id="category">
          <option value="rukun_islam">Rukun Islam</option>
          <option value="rukun_iman">Rukun Iman</option>
          <option value="shalat_wajib">Shalat Wajib</option>
          <option value="gerakan_shalat">Gerakan Shalat</option>
          <option value="nama_rasul">Nama Rasul</option>
          <option value="nama_malaikat">Nama Malaikat</option>
          <option value="nama_kitab">Nama Rasul</option>
          <option value="rukun_haji">Rukun Haji</option>
          <option value="hukum_islam">Hukum Islam</option>
          <option value="istilah_puasa">Istilah Puasa</option>
        </select>
        <button onclick="startGame()">Mulai</button>
        <button onclick="openFullscreen()">🔳 Fullscreen</button>
      </div>

      <div id="wordList"></div>
      <div id="grid"></div>

      <div class="bottom-bar">
        <div class="score">Skor: <span id="score">0</span></div>

        <button onclick="startGame()" class="restart">🔄 Restart</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
